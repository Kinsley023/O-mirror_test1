<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>你的頭皮住著哪種毛囊寶寶？ | O'Mirror 專屬髮肌測驗</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.3">
    <style>
        .camera-wrapper, .loading-wrapper {
            background: transparent !important;

</head>
<body>
    <div id="app-container">
        <!-- Magical Arch Background Frame -->
        <div class="moodboard-bg">
            <svg class="arch-frame" viewBox="0 0 400 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
                <!-- Outer Arch (spans almost entire screen height) -->
                <path d="M 25 780 L 25 180 A 175 175 0 0 1 375 180 L 375 780" fill="none" stroke="rgba(210, 255, 114, 0.35)" stroke-width="2.2" />
                <!-- Inner Arch -->
                <path d="M 31 774 L 31 180 A 169 169 0 0 1 369 180 L 369 774" fill="none" stroke="rgba(210, 255, 114, 0.55)" stroke-width="1.2" />
                
                <!-- Top Four-pointed Star (moved down to prevent clipping) -->

                    <path d="M 0,-15 L 4,-4 L 15,0 L 4,4 L 0,15 L -4,4 L -15,0 L -4,-4 Z" fill="#FDFCC9" filter="drop-shadow(0 0 5px rgba(210, 255, 114, 0.8))" />
                </g>
                <!-- Bottom Four-pointed Star -->
                <g transform="translate(200, 792)">
                    <path d="M 0,-15 L 4,-4 L 15,0 L 4,4 L 0,15 L -4,4 L -15,0 L -4,-4 Z" fill="#FDFCC9" filter="drop-shadow(0 0 5px rgba(210, 255, 114, 0.8))" />
                </g>

                <!-- Twinkling Geometric Stars around the perimeter -->
                <g class="twinkle-star" transform="translate(80, 160)">
                    <path d="M 0,-7 L 2,-2 L 7,0 L 2,2 L 0,7 L -2,2 L -7,0 L -2,-2 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>
                <g class="twinkle-star" transform="translate(320, 160)">
                    <path d="M 0,-7 L 2,-2 L 7,0 L 2,2 L 0,7 L -2,2 L -7,0 L -2,-2 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>
                <g class="twinkle-star" transform="translate(60, 380)">
                    <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>
                <g class="twinkle-star" transform="translate(340, 420)">
                    <path d="M 0,-6 L 1.5,-1.5 L 6,0 L 1.5,1.5 L 0,6 L -1.5,1.5 L -6,0 L -1.5,-1.5 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>
                <g class="twinkle-star" transform="translate(90, 680)">
                    <path d="M 0,-7 L 2,-2 L 7,0 L 2,2 L 0,7 L -2,2 L -7,0 L -2,-2 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>
                <g class="twinkle-star" transform="translate(310, 660)">
                    <path d="M 0,-7 L 2,-2 L 7,0 L 2,2 L 0,7 L -2,2 L -7,0 L -2,-2 Z" fill="#FDFCC9" filter="drop-shadow(0 0 3px rgba(210, 255, 114, 0.6))" />
                </g>

                <!-- Baroque Classical Scroll Vines (Left Side) -->
                <!-- Vines line paths (using looping swirls) -->
                <path d="M 38 180 C 15 170 5 130 30 110 C 50 90 25 70 15 90 C 5 110 15 130 25 125 M 25 320 C -5 320 -15 280 10 260 C 30 240 10 220 5 240 M 25 480 C -5 480 -15 520 10 540 C 30 560 10 580 5 560 M 25 660 C 5 660 -10 690 10 710 C 30 730 40 700 25 680 C 15 660 30 650 35 665" fill="none" stroke="rgba(210, 255, 114, 0.55)" stroke-width="1.6" />
                <!-- Leaf clusters left -->
                <!-- Top Group -->
                <path d="M 30 110 C 20 110 15 100 20 95 C 25 90 30 100 30 110 M 30 110 C 30 100 25 90 35 85 C 45 90 40 100 30 110 M 30 110 C 40 110 45 100 40 95 C 35 90 30 100 30 110 Z" fill="#BCE178" />
                <path d="M 15 90 C 5 90 0 80 5 75 C 10 70 15 80 15 90 M 15 90 C 15 80 10 70 20 65 C 30 70 25 80 15 90 M 15 90 C 25 90 30 80 25 75 C 20 70 15 80 15 90 Z" fill="#BCE178" />
                <!-- Middle Top Group -->
                <path d="M 10 260 C 0 260 -5 250 0 245 C 5 240 10 250 10 260 M 10 260 C 10 250 5 240 15 235 C 25 240 20 250 10 260 M 10 260 C 20 260 25 250 20 245 C 15 240 10 250 10 260 Z" fill="#BCE178" />
                <!-- Middle Bottom Group -->
                <path d="M 10 540 C 0 540 -5 530 0 525 C 5 520 10 530 10 540 M 10 540 C 10 530 5 520 15 515 C 25 520 20 530 10 540 M 10 540 C 20 540 25 530 20 525 C 15 520 10 530 10 540 Z" fill="#BCE178" />
                <!-- Bottom Group -->
                <path d="M 10 710 C 0 710 -5 700 0 695 C 5 690 10 700 10 710 M 10 710 C 10 700 5 690 15 685 C 25 690 20 700 10 710 M 10 710 C 20 710 25 700 20 695 C 15 690 10 700 10 710 Z" fill="#BCE178" />
                <path d="M 25 680 C 15 680 10 670 15 665 C 20 660 25 670 25 680 M 25 680 C 25 670 20 660 30 655 C 40 660 35 670 25 680 M 25 680 C 35 680 40 670 35 665 C 30 660 25 670 25 680 Z" fill="#BCE178" />

                <!-- Baroque Classical Scroll Vines (Right Side) -->
                <!-- Vines line paths (using looping swirls) -->
                <path d="M 362 180 C 385 170 395 130 370 110 C 350 90 375 70 385 90 C 395 110 385 130 375 125 M 375 320 C 405 320 415 280 390 260 C 370 240 390 220 395 240 M 375 480 C 405 480 415 520 390 540 C 370 560 390 580 395 560 M 375 660 C 395 660 410 690 390 710 C 370 730 360 700 375 680 C 385 660 370 650 365 665" fill="none" stroke="rgba(210, 255, 114, 0.55)" stroke-width="1.6" />
                <!-- Leaf clusters right -->
                <!-- Top Group -->
                <path d="M 370 110 C 360 110 355 100 360 95 C 365 90 370 100 370 110 M 370 110 C 370 100 365 90 375 85 C 385 90 380 100 370 110 M 370 110 C 380 110 385 100 380 95 C 375 90 370 100 370 110 Z" fill="#BCE178" />
                <path d="M 385 90 C 375 90 370 80 375 75 C 380 70 385 80 385 90 M 385 90 C 385 80 380 70 390 65 C 400 70 395 80 385 90 M 385 90 C 395 90 400 80 395 75 C 390 70 385 80 385 90 Z" fill="#BCE178" />
                <!-- Middle Top Group -->
                <path d="M 390 260 C 380 260 375 250 380 245 C 385 240 390 250 390 260 M 390 260 C 390 250 385 240 395 235 C 405 240 400 250 390 260 M 390 260 C 400 260 405 250 400 245 C 395 240 390 250 390 260 Z" fill="#BCE178" />
                <!-- Middle Bottom Group -->
                <path d="M 390 540 C 380 540 375 530 380 525 C 385 520 390 530 390 540 M 390 540 C 390 530 385 520 395 515 C 405 520 400 530 390 540 M 390 540 C 400 540 405 530 400 525 C 395 520 390 530 390 540 Z" fill="#BCE178" />
                <!-- Bottom Group -->
                <path d="M 390 710 C 380 710 375 700 380 695 C 385 690 390 700 390 710 M 390 710 C 390 700 385 690 395 685 C 405 690 400 700 390 710 M 390 710 C 400 710 405 700 400 695 C 395 690 390 700 390 710 Z" fill="#BCE178" />
                <path d="M 375 680 C 365 680 360 670 365 665 C 370 660 375 670 375 680 M 375 680 C 375 670 370 660 380 655 C 390 660 385 670 375 680 M 375 680 C 385 680 390 670 385 665 C 380 660 375 670 375 680 Z" fill="#BCE178" />
            </svg>
        </div>

        <!-- Global Header Logo -->
        <header class="logo global-logo">
            <div class="oright-logo-wrapper">
                <span class="oright-logo-dot"></span>
                <span class="oright-logo-text">'right</span>
                <span class="oright-logo-divider">|</span>
                <span class="oright-logo-mirror">O'Mirror</span>
            </div>
        </header>

    <!-- 1. Landing Page -->
    <section id="landing" class="screen active">
        <div class="top-arch-spacer"></div>
        <div class="content-wrapper">
            <h3 class="subtitle">O'Mirror 綠色永續 專屬髮肌測驗</h3>
            <h1 class="title">你的頭皮住著哪種<br>毛囊寶寶？</h1>
            
            <div class="mascot-container">
                <div class="png-mascot-wrapper">
                    <img src="images/mascot.png" class="mascot-image-png" alt="Mascot">
                    <!-- Overlays to cover original static eyes -->
                    <div class="eye-cover left"></div>
                    <div class="eye-cover right"></div>
                    <!-- Blinking dynamic eyes -->
                    <div class="eye-blink left"></div>
                    <div class="eye-blink right"></div>
                </div>
            </div>
        </div>
        
        <div class="bottom-action">
            <button id="start-btn" class="glass-btn primary">
                Start 測驗開始
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
            <div class="scroll-indicator">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
            </div>
        </div>
    </section>

    <!-- 2. Quiz Section -->
    <section id="quiz" class="screen">
        <div class="top-arch-spacer"></div>
        <div class="progress-bar-container">
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
            <div class="progress-text"><span id="current-q">1</span> / 12</div>
        </div>
        <div class="quiz-container" id="quiz-container">
            <!-- Question card will be injected here -->
        </div>
    </section>

    <!-- 3. Camera / Upload Section -->
    <section id="camera" class="screen">
        <div class="top-arch-spacer"></div>
        <div class="content-wrapper camera-wrapper">
            <h2 class="title">看看你的毛囊寶寶長怎樣！</h2>
            <p class="subtitle">請對準框線，讓我們為您掃描</p>
            
            <div class="viewfinder">
                <div class="corners top-left"></div>
                <div class="corners top-right"></div>
                <div class="corners bottom-left"></div>
                <div class="corners bottom-right"></div>
                <div class="face-guide"></div>
                
                <div class="alignment-hint" id="alignment-hint">請將臉部對準虛線框</div>
                <div class="camera-stream-placeholder">
                    <!-- Video stream will go here -->
                </div>
            </div>

            <div class="camera-actions">
                <button id="capture-btn" class="glass-btn primary capture-btn">
                    <div class="lens"></div>
                </button>
                <button id="upload-btn" class="text-btn">或是上傳照片</button>
            </div>
        </div>
        <div id="countdown" class="countdown-overlay hidden">3</div>
        <div id="flash" class="flash-overlay hidden"></div>
    </section>

    <!-- 4. AI Avatar Transform Loading Section -->
    <section id="loading" class="screen">
        <div class="top-arch-spacer"></div>
        <div class="content-wrapper loading-wrapper">
            <div class="scanning-container">
                <div class="scanned-image-placeholder"></div>
                <div class="scan-line"></div>
                <div class="magic-particles">
                    <div class="particle p1"></div>
                    <div class="particle p2"></div>
                    <div class="particle p3"></div>
                </div>
            </div>
            <div class="loading-text-container">
                <h3 id="loading-text">正在分析生活作息...</h3>
            </div>
        </div>
    </section>

    <!-- 5. Result Page & 6. Share Page -->
    <section id="result" class="screen scrollable">
        <div class="result-container">
            <!-- Avatar Area -->
            <div class="result-avatar-area">
                <div class="avatar-frame">
                    <div class="avatar-image" id="result-avatar"></div>
                </div>
                <div class="speech-bubble">
                    <p id="result-quote">「主人，感謝你的精緻護理，我很閃亮！」</p>
                </div>
            </div>

            <!-- Title & Score Area -->
            <div class="result-title-area">
                <h2 id="result-title">【髮界富養貴婦人】</h2>
                <div class="health-score-container">
                    <span>頭皮健康指數</span>
                    <div class="score-bar">
                        <div class="score-fill" id="result-score-fill"></div>
                    </div>
                    <span class="score-number" id="result-score">95%</span>
                </div>
            </div>

            <!-- Analysis Area (Journal Style) -->
            <div class="journal-card">
                <div class="journal-section">
                    <h3>✨ 特質敘述</h3>
                    <p id="result-desc">你的髮絲活在五星級飯店裡。你有極佳的護理觀念，將頭皮視為臉部的延伸，追求原生髮質的極致光澤與健康質感。</p>
                </div>
            </div>

            <!-- Product Recommendation Area -->
            <div class="product-recommendation">
                <h3>適合您的專屬處方箋</h3>
                
                <!-- Tips Area -->
                <div class="journal-card" style="margin-bottom: 1.5rem;">
                    <div class="journal-section">
                        <h3>🌱 生活小撇步</h3>
                        <p id="result-tips">洗頭前先用梳子輕柔按摩頭皮，洗完頭後務必先塗抹護髮油再吹乾，鎖住髮絲水分。</p>
                    </div>
                </div>

                <div class="product-cards" id="product-list">
                    <!-- Products injected via JS -->
                </div>
            </div>

            <!-- Share & CRM Area -->
            <div class="share-crm-area">
                <div class="share-buttons">
                    <button class="glass-btn secondary share-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                        儲存毛囊寶寶卡
                    </button>
                    <button class="glass-btn secondary share-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/></svg>
                        分享結果
                    </button>
                    <button id="retake-btn" class="glass-btn secondary share-btn">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
                        重新拍照
                    </button>
                </div>

                <div class="crm-box">
                    <div class="gift-icon">🎁</div>
                    <h3>領取完整保養教學與折價券</h3>
                    <div class="email-form">
                        <input type="email" id="email-input" placeholder="請輸入 Email...">
                        <button id="submit-email" class="glass-btn primary small">領取</button>
                    </div>
                </div>
            </div>
            
            <footer class="footer">
                <button id="restart-btn" class="text-btn">重新測驗</button>
            </footer>
        </div>
        <div id="confetti-container"></div>
    </section>

    </div> <!-- /app-container -->
    
    <script src="app.js"></script>
</body>
</html>
